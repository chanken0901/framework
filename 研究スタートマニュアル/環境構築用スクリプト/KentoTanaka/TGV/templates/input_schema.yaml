format: key_value
extension: .dat
comment_prefix: '#'
sections:
  case:
  - case_id
  - case_label
  - status
  - description
  model:
  - physics_model
  - flow_type
  - solver_type
  grid:
  - nx
  - ny
  - nz
  - x_min
  - x_max
  - y_min
  - y_max
  - z_min
  - z_max
  time:
  - cfl
  - dt
  - t_max
  - output_frequency
  - save_interval
  numerics:
  - flux
  - reconstruction
  - time_integration
  storage:
  - raw_data_location
  - output_location
  - restart_location
  physics_nse:
  - gamma
  - rho_0
  - mach_number
  - reynolds_number
  - prandtl_number
  flow_tgv:
  - amplitude
  - mode_x
  - mode_y
  - mode_z
note: generate_case_docs_tool.py が case.yaml から input.dat を生成するときに参照する。
